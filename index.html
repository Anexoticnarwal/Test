<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melody Scribe Final</title>
    <link rel="stylesheet" href="style.css">
    <!-- Stable Libraries -->
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <script src="https://unpkg.com/vexflow/releases/vexflow-min.js"></script>
</head>
<body>

    <!-- 1. HTTPS Warning (Hidden by default) -->
    <div id="https-guard">
        <div class="guard-content">
            <h2>⚠️ Security Block</h2>
            <p>Microphone access requires a Secure Connection (HTTPS).</p>
            <p class="small">If testing on mobile, you MUST deploy to GitHub Pages. Local IP addresses will not work.</p>
        </div>
    </div>

    <!-- 2. Start Screen Overlay -->
    <div id="start-screen">
        <div class="content">
            <h1>Melody Scribe</h1>
            <p>Turn your voice into sheet music.</p>
            <button id="startBtn">TAP TO START</button>
            <div id="loading-status"></div>
        </div>
    </div>

    <!-- 3. Main App -->
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="live-indicator">
                    <span class="blink">●</span> LISTENING
                </div>
                <button id="clearBtn">Clear</button>
            </div>
        </header>

        <!-- Sheet Music Area -->
        <div id="scroll-wrapper">
            <div id="notation"></div>
        </div>

        <!-- Real-time Indicators -->
        <div class="indicators">
            <div class="box">
                <span class="label">SUGGESTED FINGER</span>
                <span id="finger-display">-</span>
            </div>
            <div class="box">
                <span class="label">DETECTED NOTE</span>
                <span id="note-display">-</span>
            </div>
        </div>

        <!-- Piano Visual -->
        <div class="piano-container">
            <div class="piano" id="piano"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
