<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Scribe</title>
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://unpkg.com/vexflow/releases/vexflow-min.js"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Melody Scribe</h1>
            <button id="startBtn">Start Listening</button>
            <div id="status">Tap Start to enable Mic</div>
        </header>

        <!-- Sheet Music Canvas -->
        <div id="sheet-music-container">
            <div id="notation"></div>
        </div>

        <!-- Finger Guide -->
        <div class="finger-guide">
            <span>Suggested Finger:</span>
            <span id="finger-display" class="finger-badge">-</span>
        </div>

        <!-- Piano Visualizer -->
        <div class="piano-container">
            <div class="piano" id="piano">
                <!-- Keys generated by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
