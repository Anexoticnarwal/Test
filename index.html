<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melody Scribe</title>
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://unpkg.com/vexflow/releases/vexflow-min.js"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Melody Scribe</h1>
                <button id="clearBtn" class="secondary-btn">Clear</button>
            </div>
            <button id="startBtn">Tap to Start Listening</button>
            <div id="status">Waiting for input...</div>
        </header>

        <!-- Sheet Music (Scrollable) -->
        <div id="scroll-wrapper">
            <div id="notation"></div>
        </div>

        <!-- Finger Guide -->
        <div class="finger-guide">
            <div class="finger-box">
                <span class="label">FINGER</span>
                <span id="finger-display" class="big-num">-</span>
            </div>
            <div class="finger-box">
                <span class="label">NOTE</span>
                <span id="note-display" class="big-num">-</span>
            </div>
        </div>

        <!-- Piano Visualizer -->
        <div class="piano-container">
            <div class="piano" id="piano">
                <!-- Keys generated by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
