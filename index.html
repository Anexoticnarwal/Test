<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Deep Food Facts (Fixed)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f3f4f6; --card-bg: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: var(--primary); }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }
        .header { padding: 20px; text-align: center; background: #fafafa; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; color: #7f8c8d; font-size: 0.9rem; }
        .img-container { width: 100%; height: 250px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        .scores { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; border-bottom: 1px solid #eee; }
        .score-box { text-align: center; padding: 10px; border-radius: 8px; background: #f8f9fa; }
        .score-box strong { display: block; font-size: 1.2rem; margin-bottom: 4px; }
        .score-box span { font-size: 0.75rem; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
        .grade-a { color: #2ecc71; } .grade-b { color: #85c440; } .grade-c { color: #f1c40f; }
        .grade-d { color: #e67e22; } .grade-e { color: #e74c3c; } .grade-unknown { color: #95a5a6; }
        .details { padding: 20px; }
        .detail-row { margin-bottom: 15px; }
        .detail-title { font-weight: 600; font-size: 0.9rem; color: #34495e; display: block; margin-bottom: 4px; }
        .detail-content { font-size: 0.95rem; line-height: 1.5; color: #555; }
        .tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; margin: 2px; }
        .tag.alert { background: #ffebee; color: #c62828; }
        .controls { position: sticky; bottom: 20px; text-align: center; }
        button { background-color: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3); transition: transform 0.1s; width: 90%; max-width: 400px; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.7; cursor: wait; }
        #status { margin-top: 10px; font-size: 0.85rem; color: #7f8c8d; text-align: center; min-height: 20px; padding: 0 10px;}
        .error-msg { color: #e74c3c !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="img-container">
            <img id="product-img" src="https://placehold.co" alt="Product Image">
        </div>
        
        <div class="header">
            <h1 id="product-name">Unknown Product</h1>
            <p id="product-brand">Tap the button below to start</p>
        </div>

        <div class="scores">
            <div class="score-box">
                <strong id="score-nutri" class="grade-unknown">?</strong>
                <span>Nutri-Score</span>
            </div>
            <div class="score-box">
                <strong id="score-nova" class="grade-unknown">?</strong>
                <span>NOVA Group</span>
            </div>
            <div class="score-box">
                <strong id="score-eco" class="grade-unknown">?</strong>
                <span>Eco-Score</span>
            </div>
        </div>

        <div class="details">
            <div class="detail-row">
                <span class="detail-title">🌍 Origins & Manufacturing</span>
                <div id="origins" class="detail-content">N/A</div>
            </div>
            <div class="detail-row">
                <span class="detail-title">⚠️ Allergens</span>
                <div id="allergens" class="detail-content">None listed</div>
            </div>
            <div class="detail-row">
                <span class="detail-title">🧪 Additives</span>
                <div id="additives" class="detail-content">None listed</div>
            </div>
            <div class="detail-row">
                <span class="detail-title">💊 Key Nutrients (100g)</span>
                <div id="vitamins" class="detail-content">No data available</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="scan-btn">🎲 Fetch Random Product</button>
        <div id="status">Waiting for input...</div>
    </div>
</div>

<script>
    const btn = document.getElementById('scan-btn');
    const statusMsg = document.getElementById('status');
    const safeGet = (val, fallback = 'N/A') => (val && val.trim() !== '') ? val : fallback;

    // 1. Check if running locally (which blocks APIs)
    if (window.location.protocol === 'file:') {
        alert("⚠️ WARNING: You are opening this file directly.\n\nThis prevents the App from talking to the Internet (CORS security).\n\nPlease upload this to GitHub Pages to make it work on mobile!");
        statusMsg.innerText = "⚠️ Error: Open via GitHub Pages, not file://";
        statusMsg.classList.add('error-msg');
        btn.disabled = true;
    }

    async function fetchProduct() {
        btn.disabled = true;
        statusMsg.innerText = "🛰️ Contacting Food Database...";
        statusMsg.classList.remove('error-msg');
        
        try {
            const randomPage = Math.floor(Math.random() * 500) + 1;
            const fields = "product_name,brands,image_front_url,nutriscore_grade,nova_group,ecoscore_grade,origins,manufacturing_places,allergens_tags,additives_tags,packaging,nutriments";
            
            // 2. Added User-Agent to prevent blocking
            const response = await fetch(`https://openfoodfacts.org{randomPage}&fields=${fields}&json=true`, {
                headers: {
                    'User-Agent': 'RandomFoodDiscovery/1.0 (Student Project)' 
                }
            });

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const data = await response.json();
            if (!data.products || data.products.length === 0) throw new Error("Empty result. Try again!");

            updateUI(data.products[0]);
            statusMsg.innerText = "✅ Data received!";

        } catch (error) {
            console.error(error);
            statusMsg.innerText = "❌ " + error.message;
            statusMsg.classList.add('error-msg');
        } finally {
            btn.disabled = false;
        }
    }

    function updateUI(p) {
        document.getElementById('product-name').innerText = p.product_name || "Unnamed Product";
        document.getElementById('product-brand').innerText = p.brands || "Unknown Brand";
        document.getElementById('product-img').src = p.image_front_url || "https://placehold.co";

        setScore('score-nutri', (p.nutriscore_grade || '?').toUpperCase());
        setScore('score-nova', p.nova_group || '?');
        setScore('score-eco', (p.ecoscore_grade || '?').toUpperCase());

        document.getElementById('origins').innerText = `${safeGet(p.origins, 'Unknown Origin')} (Made in: ${safeGet(p.manufacturing_places, 'Unknown')})`;
        
        renderTags('allergens', p.allergens_tags, true);
        renderTags('additives', p.additives_tags, false);

        const n = p.nutriments || {};
        const vits = [];
        if (n['vitamin-c_100g']) vits.push(`Vit C: ${n['vitamin-c_100g']}g`);
        if (n['calcium_100g']) vits.push(`Calcium: ${n['calcium_100g']}g`);
        if (n['iron_100g']) vits.push(`Iron: ${n['iron_100g']}g`);
        if (n['sugars_100g']) vits.push(`Sugars: ${n['sugars_100g']}g`);
        
        document.getElementById('vitamins').innerHTML = vits.length > 0 ? vits.map(v => `<span class="tag">${v}</span>`).join('') : "No key nutrients listed.";
    }

    function setScore(id, value) {
        const el = document.getElementById(id);
        el.innerText = value;
        el.className = '';
        if (['A', '1'].includes(value)) el.classList.add('grade-a');
        else if (['B', '2'].includes(value)) el.classList.add('grade-b');
        else if (['C', '3'].includes(value)) el.classList.add('grade-c');
        else if (['D', '4'].includes(value)) el.classList.add('grade-d');
        else if (['E'].includes(value)) el.classList.add('grade-e');
        else el.classList.add('grade-unknown');
    }

    function renderTags(id, tags, isAlert) {
        const el = document.getElementById(id);
        if (!tags || tags.length === 0) { el.innerText = "None"; return; }
        const cleanTags = tags.map(t => t.replace(/en:|fr:/g, '').replace(/-/g, ' ')).slice(0, 5);
        el.innerHTML = cleanTags.map(t => `<span class="tag ${isAlert ? 'alert' : ''}">${t}</span>`).join('');
    }

    btn.addEventListener('click', fetchProduct);
</script>
</body>
</html>
